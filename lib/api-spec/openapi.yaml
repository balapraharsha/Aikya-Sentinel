          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudIntentResult"

  # M8 - Digital Behaviour Twin
  /twin/analyse:
    post:
      operationId: analyseDigitalTwin
      tags: [ai]
      summary: M8 - Digital Behaviour Twin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalTwinResult"

  # M9 - Pattern Genome
  /patterns/match:
    post:
      operationId: matchPatterns
      tags: [ai]
      summary: M9 - Pattern Genome
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatternMatchInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
