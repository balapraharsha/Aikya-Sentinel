      tags: [ai]
      summary: M18 - Risk Personality Profiling
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalityResult"

  # M19 - Adaptive Learning
  /learning/feedback:
    post:
      operationId: submitLearningFeedback
      tags: [ai]
      summary: M19 - Adaptive Learning feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearningFeedbackInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # M20 - Risk Heatmap Dashboard API
  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: M20 - Risk Heatmap Dashboard overview
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/risk-trends:
    get:
      operationId: getRiskTrends
      tags: [dashboard]
      summary: Risk trends over time
      parameters:
        - name: days
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskTrendPoint"

  /dashboard/top-risky-entities:
    get:
      operationId: getTopRiskyEntities
      tags: [dashboard]
      summary: Top risky entities
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskyEntity"

  /dashboard/alert-stats:
