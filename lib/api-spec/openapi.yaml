  # M10 - Risk Radar
  /riskradar/analyse:
    post:
      operationId: analyseRiskRadar
      tags: [ai]
      summary: M10 - Risk Radar (aggregate all module scores)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskRadarResult"

  # M11 - Explainable AI
  /xai/explain:
    post:
      operationId: explainDecision
      tags: [ai]
      summary: M11 - Explainable AI (SHAP explanations)
      requestBody:
        required: true
        content:
          application/json:
            schema:
