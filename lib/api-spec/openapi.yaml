              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionVolumePoint"

  # Risk Scores
  /risk-scores/{entityId}:
    get:
      operationId: getRiskScores
      tags: [ai]
      summary: Get composite risk scores for an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskScore"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    AuthTokens:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
