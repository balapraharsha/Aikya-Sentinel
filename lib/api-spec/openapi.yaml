  # M12 - Timeline Tracker
  /timeline/entity/{entityId}:
    get:
      operationId: fetchEntityTimeline
      tags: [ai]
      summary: M12 - Timeline Tracker
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
