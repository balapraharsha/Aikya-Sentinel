          application/json:
            schema:
              $ref: "#/components/schemas/CaseUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  # AI Modules

  # M1 - Behaviour DNA Engine
  /behaviour/analyse:
    post:
      operationId: analyseBehaviour
      tags: [ai]
      summary: M1 - Behaviour DNA Engine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehaviourAnalysisResult"

  # M2 - Insider Threat Engine
  /insider/analyse:
    post:
      operationId: analyseInsiderThreat
      tags: [ai]
      summary: M2 - Insider Threat Engine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsiderThreatResult"

  # M3 - Fund Flow Intelligence
  /fundflow/analyse:
    post:
      operationId: analyseFundFlow
      tags: [ai]
      summary: M3 - Fund Flow Intelligence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundFlowInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundFlowResult"

  # M4 - Lifestyle vs Income Risk
  /taxrisk/analyse:
    post:
      operationId: analyseTaxRisk
      tags: [ai]
      summary: M4 - Lifestyle vs Income Risk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxRiskResult"

  # M5 - Shell/Mule Detection
  /shell/analyse:
    post:
      operationId: analyseShellMule
      tags: [ai]
      summary: M5 - Shell/Mule Detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShellMuleResult"

  # M6 - Collusion Detection
  /collusion/analyse:
    post:
      operationId: analyseCollusion
      tags: [ai]
      summary: M6 - Collusion Detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollusionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollusionResult"

  # M7 - Fraud Intent Prediction
  /intent/analyse:
    post:
      operationId: analyseFraudIntent
      tags: [ai]
      summary: M7 - Fraud Intent Prediction
      requestBody:
        required: true
