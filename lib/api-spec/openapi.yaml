  # M13 - Trust Score Engine
  /trust/calculate:
    post:
      operationId: calculateTrustScore
      tags: [ai]
      summary: M13 - Trust Score Engine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
